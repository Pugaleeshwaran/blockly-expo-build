<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BLE OTA Text Editor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    textarea {
      width: 100%;
      height: 220px;
      font-family: monospace;
      font-size: 14px;
    }
    button {
      padding: 8px 16px;
      margin-top: 10px;
      margin-right: 5px;
    }
    #status {
      margin-top: 12px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>BLE OTA – Text Editor Upload</h2>

<textarea id="editor" placeholder="Type or paste your code here..."></textarea>

<br>

<button onclick="connect()">🔗 Connect BLE</button>
<button onclick="uploadText()">⬆️ Upload Code</button>

<div id="status">Status: Not connected</div>

<script>
let device, server, service;
let controlChar, dataChar;

const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const CONTROL_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
const DATA_UUID    = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

function setStatus(msg) {
  document.getElementById("status").innerText = "Status: " + msg;
}

async function connect() {
  try {
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SERVICE_UUID]
    });

    server = await device.gatt.connect();
    service = await server.getPrimaryService(SERVICE_UUID);

    controlChar = await service.getCharacteristic(CONTROL_UUID);
    dataChar = await service.getCharacteristic(DATA_UUID);

    setStatus("Connected to " + device.name);
  } catch (e) {
    alert(e);
  }
}

async function uploadText() {
  if (!controlChar || !dataChar) {
    alert("Connect BLE first");
    return;
  }

  const text = document.getElementById("editor").value;
  if (!text.length) {
    alert("Editor is empty");
    return;
  }

  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const CHUNK_SIZE = 180;

  setStatus("Uploading code...");

  await controlChar.writeValue(encoder.encode("START"));

  for (let i = 0; i < data.length; i += CHUNK_SIZE) {
    const chunk = data.slice(i, i + CHUNK_SIZE);
    await dataChar.writeValue(chunk);
    await sleep(10);   // flow control
  }

  await controlChar.writeValue(encoder.encode("END"));

  setStatus("Upload complete (" + data.length + " bytes)");
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}
</script>

</body>
</html>
